name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JDK 21 (required by Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Production build (sanity)
        run: npm run build
        env:
          # Build needs these to satisfy NEXT_PUBLIC_* checks. Real values
          # don't matter for the build step.
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-noop
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-noop
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-noop.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-noop.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:0:web:0"

      - name: Security rules emulator suite
        run: npm run test:rules

      - name: Auth + claims integration tests
        run: npm run test:auth
